services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: finance-app
        working_dir: /app
        volumes:
            - ./:/app
            - caddy_data:/data
            - ./docker/Caddyfile:/etc/Frankenphp/Caddy/Caddyfile
        ports:
            - "49000:80"
            - "5173:5173"
        environment:
            SERVER_NAME: ":80"
        tty: true
        depends_on:
            - db
            - redis

    redis:
        image: redis:alpine
        container_name: finance-redis
        ports:
            - "6379:6379"

    db:
        image: postgres:16
        container_name: finance-db
        restart: always
        environment:
            POSTGRES_DB: finance
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: root
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data

    mailhog:
        image: mailhog/mailhog:latest
        container_name: finance-mailhog
        ports:
            - "49001:8025"

volumes:
    caddy_data:
    pgdata:
