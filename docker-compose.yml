services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    user: "${UID}:${GID}"
    container_name: finance-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
  nginx:
    image: nginx:alpine
    container_name: finance-nginx
    ports:
      - "49000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: finance-db
    restart: always
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  # Declaração obrigatória do volume nomeado usado no DB
volumes:
    pgdata:
